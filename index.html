<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ฉันคือใครในอนิเมะ? (Ultimate Edition)</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎲</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Kanit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="top-actions">
        <button id="themeToggle" class="icon-btn" onclick="toggleTheme()" title="สลับโหมด มืด/สว่าง">🌙</button>
    </div>

    <div class="container">
        <h1 class="anime-title">✨ ฉันคือใครในอนิเมะ? ✨</h1>

        <div id="result" class="result-card">
            <div class="loader" id="loader"></div>
            <p id="clickHint" class="hint-text" style="display:none; margin-bottom:10px;">🔍 กดที่รูปเพื่อดูแบบเต็มจอ
            </p>
            <img id="charImg" src="" alt="Anime Character" onclick="openModal()">
            <h2 id="charName">พร้อมแล้วสุ่มเลย!</h2>
            <p id="animeName"></p>
            <p id="charPop" class="popularity-stat" style="display: none;"></p>
            <button id="btnReveal" class="btn-reveal" onclick="revealCharacter()" style="display: none;">👁️
                ดูเฉลย</button>
        </div>

        <div class="main-buttons">
            <button id="btnRandom" class="btn-main" onclick="randomCharacter()">🎲 สุ่มตัวละคร!</button>
            <button id="btnReset" class="btn-reset" onclick="resetHistory()" style="display: none;">🔄
                ล้างความจำการสุ่ม</button>
        </div>

        <details class="collapsible-section">
            <summary>⚙️ ตั้งค่าการสุ่ม</summary>
            <div class="settings-panel">
                <div class="setting-row">
                    <span class="toggle-label">❓ โหมดทายชื่อ (ปิดบังชื่อไว้เล่นกับเพื่อน)</span>
                    <label class="switch"><input type="checkbox" id="guessMode" onchange="saveSettings()"><span
                            class="slider"></span></label>
                </div>
                <div class="setting-row">
                    <span class="toggle-label">🔁 สุ่มเจอตัวเดิมซ้ำได้</span>
                    <label class="switch"><input type="checkbox" id="allowDupes" onchange="saveSettings()"><span
                            class="slider"></span></label>
                </div>
                <hr class="mini-divider">
                <div class="setting-row">
                    <span class="toggle-label">🎭 บทบาทตัวละคร</span>
                    <select id="roleFilter" class="dropdown-input" onchange="saveSettings()">
                        <option value="All">ทั้งหมด (พระเอก & ตัวประกอบ)</option>
                        <option value="Main">เฉพาะตัวเอก (Main)</option>
                        <option value="Supporting">เฉพาะตัวสมทบ (Supporting)</option>
                    </select>
                </div>
                <div class="setting-row">
                    <span class="toggle-label">🏆 สุ่มจากตัวท็อป</span>
                    <div style="display: flex; align-items: center; gap: 5px;">
                        <span class="hint-text">อันดับ 1 ถึง</span>
                        <input type="number" id="topX" class="num-input" value="20" min="1" max="100"
                            onchange="saveSettings()">
                    </div>
                </div>
                <div class="setting-row">
                    <span class="toggle-label">❤️ ขั้นต่ำความนิยม</span>
                    <input type="number" id="minPopularity" class="num-input" value="100" step="100" min="0"
                        onchange="saveSettings()">
                </div>
            </div>
        </details>

        <details class="collapsible-section" open>
            <summary>📚 คลังอนิเมะของฉัน</summary>
            <div class="anime-section-content">
                <div class="admin-section">
                    <input type="text" id="animeInput" placeholder="🔗 ลิงก์ MyAnimeList หรือ ID">
                    <button class="btn-add" onclick="addAnime()">➕ เพิ่มเรื่อง</button>
                </div>
                <div class="anime-controls">
                    <input type="text" id="searchAnime" placeholder="🔍 ค้นหาชื่อเรื่อง..." oninput="filterAnime()">
                    <div class="bulk-actions">
                        <button onclick="toggleAllAnime(true)" class="btn-bulk btn-select">✅ เลือกหมด</button>
                        <button onclick="toggleAllAnime(false)" class="btn-bulk btn-deselect">❌ เอาออก</button>
                    </div>
                </div>
                <div class="anime-grid-container" id="animeSelector"></div>
            </div>
        </details>
    </div>

    <div id="imageModal" class="modal" onclick="closeModal()">
        <span class="close">&times;</span>
        <div class="modal-content-wrapper">
            <img class="modal-img-large" id="modalImg">
            <div class="modal-info">
                <h2 id="modalName"></h2>
                <p id="modalAnime"></p>
                <div class="modal-pop-badge" id="modalPop"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
